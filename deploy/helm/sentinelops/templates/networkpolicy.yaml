{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sentinelops.fullname" . }}
  labels:
    {{- include "sentinelops.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "sentinelops.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.service.tcpPort }}
        - protocol: TCP
          port: {{ .Values.service.metricsPort }}
        - protocol: TCP
          port: {{ .Values.service.controlAPIPort }}
  egress:
    - to:
        - namespaceSelector: {}
{{- end }}
