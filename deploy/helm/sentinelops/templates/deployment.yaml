
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sentinelops.fullname" . }}
  labels:
    {{- include "sentinelops.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "sentinelops.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sentinelops.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if and .Values.secret.create (not .Values.secret.existingSecret) }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "sentinelops.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "sentinelops.fullname" . }}
            {{- if or .Values.secret.create .Values.secret.existingSecret }}
            - secretRef:
                name: {{ include "sentinelops.secretName" . }}
            {{- end }}
          ports:
            - name: tcp
              containerPort: 2323
              protocol: TCP
            - name: metrics
              containerPort: 9000
              protocol: TCP
            - name: control-api
              containerPort: 9443
              protocol: TCP
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: app-data
              mountPath: /data
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            tcpSocket:
              port: {{ .Values.livenessProbe.tcpSocket.port }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.readinessProbe.tcpSocket.port }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          {{- end }}
        {{- if .Values.opaSidecar.enabled }}
        - name: opa
          image: {{ .Values.opaSidecar.image | quote }}
          args:
            - run
            - --server
            - --addr=0.0.0.0:8181
            - --log-level={{ .Values.opaSidecar.logLevel }}
            - --log-format=json
            - --set=decision_logs.console=true
            - /policies
          ports:
            - name: opa
              containerPort: 8181
              protocol: TCP
          volumeMounts:
            - name: opa-policies
              mountPath: /policies
              readOnly: true
          resources:
            {{- toYaml .Values.opaSidecar.resources | nindent 12 }}
        {{- end }}
      volumes:
        - name: app-data
          emptyDir: {}
        {{- if .Values.opaSidecar.enabled }}
        - name: opa-policies
          configMap:
            name: {{ include "sentinelops.fullname" . }}-opa-policies
        {{- end }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
