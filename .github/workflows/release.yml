name: sentinelops-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: read

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release notes
        run: |
          mkdir -p reports/release
          tag="${GITHUB_REF_NAME}"
          previous="$(git describe --tags --abbrev=0 "${tag}^" 2>/dev/null || true)"
          {
            echo "### Release ${tag}"
            echo
            if [ -n "$previous" ]; then
              echo "#### Cambios desde ${previous}"
              git log --oneline "${previous}..${tag}"
            else
              echo "#### Cambios incluidos"
              git log --oneline -n 30
            fi
          } > reports/release/notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: reports/release/notes.md
          generate_release_notes: true
